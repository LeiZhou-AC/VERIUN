# dataset: cifar10
# data_path: datasets
# allow_download: True
# split_mode: random            # random / by_class / class_random
# forget_classes: []
# class_random uses forget_classes and samples forget_ratio/forget_count per class.
# forget_manifest_path: save/manifests/default_forget_manifest.json
# forget_manifest_mode: auto

batch_size: 64
lr: 0.001
epochs: 10
alpha: 1.0
"lambda": 0.5
unlearning_method: odr

ruv_distance: cosine
ruv_metric: ras
ruv_mode: auto
ruv_knn_k: 10
ruv_rms_reference_size: 10000
ruv_rms_test_reference_size: 10000
ruv_rms_control_size: 0
ruv_ras_num_views: 8
ruv_ras_crop_padding: 4
ruv_ras_hflip_prob: 0.5
ruv_ras_noise_std: 0.0
ruv_ars_top_fraction: 0.1
ruv_ars_binary_weight: 0.5
ruv_ars_threshold: 0.0
ruv_arf_epsilon: 0.031372549
ruv_arf_step_size: 0.007843137
ruv_arf_steps: 5
ruv_arf_distance: cosine
ruv_arf_random_start: False
ruv_m4_k: 1
ruv_npg_k: 10
ruv_multi_metrics: shift,ruler_m4,npg,ars
ruv_multi_threshold: 2
ruv_alpha: 0.05
ruv_num_permutations: 100

amnesiac_epochs: 10
amnesiac_lr: 0.0001
amnesiac_optimizer: adamw
amnesiac_momentum: 0.9
amnesiac_weight_decay: 0.0005
amnesiac_mode: log
amnesiac_original_epochs: 50
amnesiac_original_lr: 0.01
amnesiac_original_optimizer: sgd
amnesiac_original_momentum: 0.9
amnesiac_original_weight_decay: 0.0005
amnesiac_log_dir: save/unlearning_logs/amnesiac
amnesiac_log_scale: 1.0
amnesiac_repair_epochs: 5
amnesiac_repair_lr: 0.001
amnesiac_repair_batches: 0
amnesiac_relabel_weight: 1.0
amnesiac_retain_weight: 0.5
amnesiac_max_relabel_batches: 0
amnesiac_max_retain_batches: 64
amnesiac_grad_clip: 5.0
amnesiac_validate_every: 1
amnesiac_train_scope: full
amnesiac_label_seed: 42
amnesiac_label_strategy: cyclic

salun_epochs: 10
salun_lr: 0.013
salun_optimizer: sgd
salun_momentum: 0.9
salun_weight_decay: 0.0005
salun_mask_ratio: 0.5
salun_mask_batches: 0
salun_forget_weight: 1.0
salun_retain_weight: 0.5
salun_max_forget_batches: 0
salun_max_retain_batches: 64
salun_grad_clip: 5.0
salun_validate_every: 1
salun_train_scope: full
salun_label_seed: 42
salun_label_strategy: random_any

ssd_selection_weighting: 10.0
ssd_dampening_constant: 1.0
ssd_min_scale: 0.0
ssd_max_scale: 1.0
ssd_exponent: 1.0
ssd_original_split: all
ssd_forget_batches: 0
ssd_original_batches: 0
ssd_retain_batches: 128
ssd_epsilon: 0.000000000001
