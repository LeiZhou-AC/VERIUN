# dataset: cifar10
# data_path: datasets
# allow_download: True
# split_mode: random            # random / by_class / class_random
# forget_classes: []
# class_random uses forget_classes and samples forget_ratio/forget_count per class.
# forget_manifest_path: save/manifests/default_forget_manifest.json
# forget_manifest_mode: auto

batch_size: 64
lr: 0.001
epochs: 10
alpha: 1.0
"lambda": 0.5

ruv_distance: cosine
ruv_metric: ras
ruv_mode: auto
ruv_knn_k: 10
ruv_rms_reference_size: 10000
ruv_rms_test_reference_size: 10000
ruv_rms_control_size: 0
ruv_ras_num_views: 8
ruv_ras_crop_padding: 4
ruv_ras_hflip_prob: 0.5
ruv_ras_noise_std: 0.0
ruv_alpha: 0.05
ruv_num_permutations: 100

scrub_epochs: 8
scrub_lr: 0.0001
scrub_optimizer: adamw
scrub_momentum: 0.9
scrub_weight_decay: 0.0
scrub_temperature: 4.0
scrub_forget_ce_weight: 1.0
scrub_forget_weight: 1.0
scrub_retain_ce_weight: 1.0
scrub_retain_kd_weight: 1.0
scrub_max_forget_batches: 0
scrub_max_retain_batches: 0
scrub_grad_clip: 5.0
scrub_validate_every: 1
scrub_train_scope: full
